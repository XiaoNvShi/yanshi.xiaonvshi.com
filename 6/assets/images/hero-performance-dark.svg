      <path d="M0 0 L0 -232"/><path d="M0 0 L116 -201"/><path d="M0 0 L201 -116"/><path d="M0 0 L232 0"/><path d="M0 0 L201 116"/><path d="M0 0 L116 201"/><path d="M0 0 L0 232"/><path d="M0 0 L-116 201"/><path d="M0 0 L-201 116"/><path d="M0 0 L-232 0"/><path d="M0 0 L-201 -116"/><path d="M0 0 L-116 -201"/>
