<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Dark performance cycling and hub engineering visual</title>
  <desc id="desc">A monochrome high-end bicycle hub and rider inspired abstract background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1e23"/>
      <stop offset="0.45" stop-color="#070809"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <radialGradient id="halo" cx="68%" cy="42%" r="48%">
      <stop offset="0" stop-color="#d8dde4" stop-opacity="0.28"/>
      <stop offset="0.42" stop-color="#7d8590" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="metal" cx="50%" cy="44%" r="60%">
      <stop offset="0" stop-color="#f3f5f6"/>
      <stop offset="0.24" stop-color="#a6adb6"/>
      <stop offset="0.52" stop-color="#4c535c"/>
      <stop offset="0.82" stop-color="#181b20"/>
      <stop offset="1" stop-color="#050505"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="34" stdDeviation="28" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="96" height="96" patternUnits="userSpaceOnUse">
      <path d="M96 0H0V96" fill="none" stroke="#fff" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.5"/>
  <rect width="1920" height="1080" fill="url(#halo)"/>
  <path d="M0 800 C280 700 440 720 680 772 C950 830 1110 740 1330 655 C1540 575 1740 604 1920 520 L1920 1080 L0 1080 Z" fill="#060708" opacity="0.92"/>
